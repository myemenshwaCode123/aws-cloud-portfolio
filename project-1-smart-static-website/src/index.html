<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloud Portfolio | Your Name</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    h1 { font-size: 3rem; margin-bottom: 1rem; color: #FF9900; }
    p  { font-size: 1.2rem; max-width: 600px; color: #ccc; margin-bottom: 2rem; }
    .badge {
      background: #232F3E;
      border: 1px solid #FF9900;
      color: #FF9900;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      margin: 0.3rem;
      display: inline-block;
    }
    .stack { margin-top: 2rem; }
    .footer { position: absolute; bottom: 1.5rem; color: #555; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>☁️ Cloud Portfolio</h1>
  <p>
    A production-grade, globally distributed website hosted on AWS —
    secured with HTTPS, delivered through CloudFront's CDN, and monitored with CloudWatch.
  </p>
  <div class="stack">
    <span class="badge">Amazon S3</span>
    <span class="badge">CloudFront</span>
    <span class="badge">ACM (HTTPS)</span>
    <span class="badge">CloudWatch</span>
  </div>
  <div class="footer">Hosted on AWS Free Tier · &copy; 2025 Your Name</div>
</body>
</html>
